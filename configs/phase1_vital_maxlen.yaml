# Phase 1 — phase1_vital.yaml + max_length 4× (64000 → 256000) test
# ───────────────────────────────────────────────────────────────
# 가설: max_length 가 윈도우 길이 (60000) 에 너무 가까워 PackCollate FFD packing 의
#       의미가 사라지고 (대부분 unit 이 bin 한 개를 단독 점유), batch 마다 n_rows 가
#       batch_size 근처로 변동 → memory variance → 한 rank OOM-kill.
#
# 처방: max_length 를 4× 키워 한 row 에 ~4 unit 씩 packing 가능하게 → n_rows 가
#       batch_size/4 근처로 deterministic 화. 단 row 길이 자체가 4× 길어지므로
#       attention 메모리 거동에 따라 결과가 달라짐:
#         - efficient/flash kernel: O(N) → 총 메모리 ~동일
#         - math kernel: O(N²) → 메모리 4× 악화
#       (실측 필요)
#
# 비교 대상: phase1_vital.yaml (동일 HP, max_length=64000 만 차이)
#
# Usage (2-GPU DDP):
#   torchrun --nproc_per_node=2 -m train.1_channel_independency \
#       --config configs/phase1_vital_maxlen.yaml

model_config:
  d_model: 256
  num_layers: 12
  patch_size: 200
  stride: null
  num_heads: 8
  num_groups: null
  num_signal_types: 8
  num_spatial_ids: 13
  use_glu: true
  use_moe: false
  use_rope: true
  use_var_attn_bias: true
  use_spatial_embed: true
  dropout_p: 0.1
  next_block_size: 4
  contrastive_proj_dim: 0

data_dir:
  - /home/coder/workspace/updown/bio_fm/data/train/vitaldb/
signal_types: [0, 1, 2, 3, 4, 5, 6]
max_subjects: null
window_seconds: 600.0
max_length: 256000             # ← 변경: 64000 → 256000 (4×, ~4 windows per row 가능)
cache_size: 16
crop_ratio_min: 0.01
crop_ratio_max: 1.0
min_patches: 5

shard_index_path: /home/coder/workspace/updown/bio_fm/data/train/vitaldb/vitaldb_wbs/shard_index.json
shard_cache_size: 1

# ── 학습 (phase1_vital.yaml 동일) ──
batch_size: 128
lr: 8.0e-4
n_epochs: 80
warmup_epochs: 8
min_lr_ratio: 0.1
mask_ratio: 0.4
gradient_clip: 1.0
seed: 42
collate_mode: ci
max_batches: 10000

alpha: 1.0
beta: 0.8
gamma: 0.0
delta: 0.0
lambda_spec: 0.2
peak_alpha: 1.0
aux_loss_weight: 0.01
contrastive_temperature: 0.07
learnable_temperature: true

variate_mask_prob: 0.0
block_mask: true
block_size_min: 3
block_size_max: 8

use_amp: true

val_ratio: 0.05
val_max_batches: 500
patience: 15

device: auto
num_workers: 2
output_dir: outputs/phase1_maxlen
checkpoint_every: 5
viz_every: 1
exp_name: vital_d256_L12_10min_p200_maxlen256k

# Length-aware batching (off — 우리 case 효과 없음 확인됨)
use_length_aware_batching: false
length_overpack: 8
