# Phase 1: Pure Transformer (CNN Stem 제거) 실험
# ──────────────────────────────────────────────────────────────
# CNN Stem 없이 linear patch projection만으로 학습.
# ViT/LLM 방식 — inductive bias 없이 데이터에서 직접 학습.
#
# Usage:
#   torchrun --nproc_per_node=2 -m train.1_channel_independency \
#       --config configs/phase1_no_cnn.yaml

# ── 모델 ──
model_config:
  d_model: 256
  num_layers: 12
  patch_size: 100
  stride: null
  num_heads: 8
  num_groups: null
  use_glu: true
  use_moe: false
  use_rope: true
  use_var_attn_bias: true
  use_spatial_embed: true
  dropout_p: 0.1
  max_horizon: 5
  contrastive_proj_dim: 0

# ── 데이터 ──
data_dir: ./datasets/vitaldb_h5
signal_types: [0, 1, 2, 3, 4, 5, 6]
max_subjects: null
window_seconds: 60.0
max_length: 8000
cache_size: 16
crop_ratio_min: 0.15
crop_ratio_max: 1.0

# ── 학습 ──
batch_size: 64
lr: 8.0e-4
n_epochs: 30
warmup_epochs: 3
min_lr_ratio: 0.1
mask_ratio: 0.4
gradient_clip: 1.0
seed: 42
collate_mode: ci
max_batches: 8000

# ── Loss 가중치 (best loss 조합 결과 반영 필요) ──
alpha: 1.0
beta: 0.5
gamma: 0.0
delta: 0.0
lambda_spec: 0.0
aux_loss_weight: 0.01
contrastive_temperature: 0.07
learnable_temperature: true

# ── Masking ──
variate_mask_prob: 0.0
block_mask: true
block_size_min: 3
block_size_max: 8

# ── Mixed Precision ──
use_amp: true

# ── Validation & Early Stopping ──
val_ratio: 0.05
val_max_batches: 500
patience: 15

# ── 시스템 ──
device: auto
num_workers: 4
output_dir: outputs/phase1
checkpoint_every: 5
viz_every: 1
exp_name: no_cnn_d256_L12
