# AdaLN ablation — AdaLN ON, d_cond=16
# Pair: configs/phase1_vital_ablation_baseline.yaml
# Difference vs baseline: use_adaln=true, d_cond=16, exp_name, output_dir.
# All other hyperparameters (seed, data, lr, batch, epochs, masking) IDENTICAL.
#
# d_cond=16 chosen from local ablation (outputs/local_inspect_adaln_dc16):
#   - same/better val than d_cond=64
#   - +0.5% params at d_model=256 vs ~+34% with d_cond=d_model
#
# Usage (2-GPU DDP):
#   torchrun --nproc_per_node=2 -m train.1_channel_independency \
#       --config configs/phase1_vital_ablation_adaln.yaml

model_config:
  d_model: 256
  num_layers: 12
  patch_size: 200
  stride: null
  num_heads: 8
  num_groups: null
  num_signal_types: 8
  num_spatial_ids: 13
  use_glu: true
  use_moe: false
  use_rope: true
  use_var_attn_bias: true
  use_spatial_embed: true
  dropout_p: 0.1
  next_block_size: 4
  contrastive_proj_dim: 0

  # ── ABLATION KNOB ──
  use_adaln: true
  d_cond: 16

data_dir:
  - /home/coder/workspace/updown/bio_fm/data/train/vitaldb/
signal_types: [0, 1, 2, 3, 4, 5, 6]
max_subjects: null
window_seconds: 600.0
max_length: 64000
cache_size: 16
crop_ratio_min: 0.01
crop_ratio_max: 1.0
min_patches: 5

shard_index_path: /home/coder/workspace/updown/bio_fm/data/train/vitaldb/vitaldb_wbs/shard_index.json
shard_cache_size: 1

batch_size: 128
lr: 8.0e-4
n_epochs: 6
warmup_epochs: 1
min_lr_ratio: 0.1
mask_ratio: 0.4
gradient_clip: 1.0
seed: 42
collate_mode: ci
max_batches: 2000

alpha: 1.0
beta: 0.8
gamma: 0.0
delta: 0.0
lambda_spec: 0.2
peak_alpha: 1.0
aux_loss_weight: 0.01
contrastive_temperature: 0.07
learnable_temperature: true

variate_mask_prob: 0.0
block_mask: true
block_size_min: 3
block_size_max: 8

use_amp: true

val_ratio: 0.05
val_max_batches: 100
patience: 15

device: auto
num_workers: 2
output_dir: outputs/ablation_adaln/adaln_dc16
checkpoint_every: 5
viz_every: 1
exp_name: ablation_adaln_dc16