# Local ablation training config — small but actually trained model for
# loc/scale embedding ablation (scripts/inspect_loc_scale_usage.py).
# Goal: produce a checkpoint trained beyond random init, fast enough for
# CPU local sanity (~5-15 min on 1 thread).

model_config:
  d_model: 64
  num_layers: 2
  patch_size: 100
  stride: null
  num_heads: null
  num_groups: null
  use_glu: true
  use_moe: false
  use_rope: true
  use_var_attn_bias: true
  use_spatial_embed: true
  dropout_p: 0.0
  next_block_size: 4
  contrastive_proj_dim: 0

data_dir: datasets/processed/vitaldb
signal_types: [0, 1, 2, 3, 4, 5, 6]
window_seconds: 10.0
max_length: 5000
cache_size: 4

# Shard backend ON
shard_index_path: datasets/sharded/vitaldb_small/shard_index.json
shard_cache_size: 3

batch_size: 8
lr: 5.0e-4
n_epochs: 5
warmup_epochs: 1
min_lr_ratio: 0.1
mask_ratio: 0.15
gradient_clip: 1.0
seed: 42
collate_mode: ci

alpha: 1.0
beta: 1.0
gamma: 0.0
delta: 0.0

variate_mask_prob: 0.0

device: cpu
num_workers: 0
output_dir: outputs/local_inspect
checkpoint_every: 1
dry_run: false
max_batches: 200
val_ratio: 0.05
