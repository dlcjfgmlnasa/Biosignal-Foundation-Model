# Phase 2: Any-Variate Cross-Modal Training — Base (~10M params)
# ──────────────────────────────────────────────────────────────
# Server: 2×L40S 48GB, KHDP 분석환경
# Dataset: VitalDB OR + K-MIMIC-MORTAL (ICU) 통합
# Phase 1 combined checkpoint에서 resume → cross-modal 학습
# Estimated: ~4,000 batches/epoch × 50 epochs
#
# Usage (2-GPU DDP):
#   torchrun --nproc_per_node=2 launch_phase2.py \
#       --config configs/phase2_base.yaml
#
# Smoke test:
#   python launch_phase2.py --config configs/phase2_base.yaml --dry-run

# ── Phase 1 checkpoint ──
resume: /home/coder/workspace/updown/bio_fm/output/phase1/base/checkpoints/best.pt

# ── 모델 (Phase 1과 동일 — checkpoint에서 로드) ──
model_config:
  d_model: 256
  num_layers: 12
  patch_size: 200              # 100Hz × 2초 = 200 samples/patch
  stride: null                 # non-overlapping (= patch_size)
  num_heads: 8                 # head_dim = 256/8 = 32
  num_groups: null             # MHA (= num_heads)
  use_glu: true
  use_moe: false
  use_rope: true
  use_var_attn_bias: true
  use_spatial_embed: true
  dropout_p: 0.1

  # ── Task heads ──
  next_block_size: 4          # Block Next Prediction — 미래 K patches 동시 예측 (block_size_* 대칭)
  contrastive_proj_dim: 128   # Contrastive projection head (Phase 2 활성)

# ── 데이터 (VitalDB OR + K-MIMIC 통합) ──
data_dir:
  - /home/coder/workspace/updown/bio_fm/data/train/vitaldb/
  - /home/coder/workspace/updown/bio_fm/data/train/k-mimic/
signal_types: [0, 1, 2, 3, 4, 5, 6, 7]  # ECG, ABP, PPG, CVP, CO2, AWP, PAP, ICP
max_subjects: null
window_seconds: 600.0             # 600초 (10분) 윈도우 — 다변량 세션
max_length: 120000                # 600s × 100Hz × 2 (multi-variate packing)
cache_size: 16
crop_ratio_min: 0.01               # Long recording(≥600s)만 crop — short는 영향 없음
crop_ratio_max: 1.0
min_patches: 5                     # 10s floor — multi-tier truncate 기준 (cross-modal)

# ── 학습 ──
batch_size: 64                 # any_variate multi-channel packing
lr: 2.0e-4                     # Phase 1(8e-4) 대비 낮은 LR (fine-tuning)
n_epochs: 50
warmup_epochs: 3
min_lr_ratio: 0.1              # 최종 LR = 2e-5
mask_ratio: 0.4
gradient_clip: 1.0
seed: 42
collate_mode: any_variate      # Phase 2 핵심: 다변량 collate
max_batches: 4000

# ── Loss 가중치 (Phase 2: MPM + Next-Pred + Cross-Modal + Contrastive) ──
alpha: 0.7                     # masked reconstruction (Phase 1 대비 낮춤)
beta: 0.3                      # next-patch prediction (Phase 1 대비 낮춤)
gamma: 0.5                     # cross-modal prediction (Phase 2 활성)
delta: 0.5                     # cross-modal contrastive (InfoNCE)
peak_alpha: 1.0                # Peak-Weighted MSE
lambda_spec: 0.2               # Multi-Resolution STFT Loss
spec_n_ffts: [32, 64, 128]
aux_loss_weight: 0.01
contrastive_temperature: 0.07
learnable_temperature: true

# ── Masking (Block MPM) ──
# 대칭: 미래 방향 예측 블록 크기는 model_config.next_block_size
variate_mask_prob: 0.3         # 30% 확률로 전체 variate 마스킹 (virtual sensing)
variate_drop_prob: 0.1         # 10% 확률로 variate를 attention에서 완전 제거 (zero-shot용)
block_mask: true
block_size_min: 2
block_size_max: 3

# ── Mixed Precision ──
use_amp: true

# ── Validation & Early Stopping ──
val_ratio: 0.05
val_max_batches: 500
patience: 15

# ── 시스템 ──
device: auto
num_workers: 8
output_dir: /home/coder/workspace/updown/bio_fm/output/phase2
checkpoint_every: 5
viz_every: 1
exp_name: base
