# Phase 1: Channel-Independent Pre-training — Base (~10M params)
# ──────────────────────────────────────────────────────────────
# Server: 2xL4 24GB, 8vCPU, 96GB RAM
# Dataset: VitalDB ~6,000 subjects, ~6M windows (60s each)
# Estimated: ~2,000 batches/epoch × 100 epochs ≈ 200K steps (~1.6일)
#
# Usage (2-GPU DDP):
#   torchrun --nproc_per_node=2 -m train.1_channel_independency \
#       --config configs/phase1_base.yaml
#
# Smoke test:
#   python -m train.1_channel_independency --config configs/phase1_base.yaml --dry-run

# ── 모델 (Base: d=256, L=12, ~10M params) ──
model_config:
  d_model: 256
  num_layers: 12
  patch_size: 100            # 100Hz × 1초 = 100 samples/patch
  stride: null               # non-overlapping (= patch_size)
  num_heads: 8               # head_dim = 256/8 = 32
  num_groups: null            # MHA (= num_heads)
  use_glu: true
  use_moe: false              # Phase 1 CI에서는 off
  use_rope: true
  use_var_attn_bias: true
  use_spatial_embed: true
  dropout_p: 0.1
  max_horizon: 1              # H=1로 시작, 수렴 후 3→5 증가
  use_cnn_stem: true
  contrastive_proj_dim: 0     # Phase 1에서는 비활성

# ── 데이터 ──
data_dir: ../updown/datasets/vitaldb
signal_types: [0, 1, 2, 3, 4, 5, 6]  # ECG, ABP, EEG, PPG, CVP, CO2, AWP
max_subjects: null             # 전체 ~6,000 subjects
window_seconds: 60.0           # 60초 윈도우 (60 patches)
max_length: 8000              # CI: 60초 윈도우(6000) + patch 정렬 여유
cache_size: 16
crop_ratio_min: 0.15           # 최소 9초 (60s × 0.15)
crop_ratio_max: 1.0            # 최대 전체 윈도우 (60s)

# ── 학습 ──
batch_size: 32                 # collate 빠르게, max_batches로 학습량 보상
lr: 8.0e-4
n_epochs: 100
warmup_epochs: 10              # 10% warmup
min_lr_ratio: 0.1              # 최종 LR = 8e-5
mask_ratio: 0.3                # 30% 패치 마스킹
gradient_clip: 1.0
seed: 42
collate_mode: ci
max_batches: 2000              # 256 × 2000 = 512K samples/epoch (전체의 8.5%, 100ep → ~8.5회)

# ── Loss 가중치 (Phase 1: MPM + Next-Pred) ──
alpha: 1.0                     # masked reconstruction (non-EEG raw + EEG spectral)
beta: 0.3                      # next-pred (non-EEG raw + EEG spectral)
gamma: 0.0                     # cross-modal (Phase 2에서 활성)
delta: 0.0                     # contrastive (Phase 2에서 활성)
aux_loss_weight: 0.01
contrastive_temperature: 0.07
learnable_temperature: true

# ── Masking ──
variate_mask_prob: 0.0         # Phase 1은 비활성 (Phase 2에서 0.3)

# ── Mixed Precision ──
use_amp: true                  # L4 FP16 tensor cores

# ── Validation & Early Stopping ──
val_ratio: 0.05                # subject 단위 5% validation
val_max_batches: 500           # validation 최대 배치 수
patience: 15                   # early stopping patience

# ── 시스템 ──
device: auto
num_workers: 4                 # 8vCPU → 4 workers
output_dir: outputs/phase1_base
checkpoint_every: 10
viz_every: 1
exp_name: phase1_base_d256_L12
