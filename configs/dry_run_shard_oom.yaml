# Local end-to-end test of phase1_vital.yaml settings (shard cache OOM 회피 검증)
# 로컬 path로만 변경, 모델/loss/sampler는 production yaml과 동일

model_config:
  d_model: 64
  num_layers: 2
  patch_size: 100
  stride: null
  num_heads: null
  num_groups: null
  use_glu: true
  use_moe: false
  use_rope: true
  use_var_attn_bias: true
  use_spatial_embed: true
  dropout_p: 0.0
  next_block_size: 4
  contrastive_proj_dim: 0

data_dir: datasets/processed/vitaldb
signal_types: [0, 1, 2, 3, 4, 5, 6]
window_seconds: 10.0
max_length: 5000
cache_size: 16

# Shard backend — production과 동일 설정
shard_index_path: datasets/sharded/vitaldb_small/shard_index.json
shard_cache_size: 2

batch_size: 8
lr: 1.0e-3
n_epochs: 1
warmup_epochs: 0
min_lr_ratio: 0.1
mask_ratio: 0.4
gradient_clip: 1.0
seed: 42
collate_mode: ci
max_batches: 100   # 100 batch만

alpha: 1.0
beta: 0.8
gamma: 0.0
delta: 0.0

variate_mask_prob: 0.0
block_mask: true
block_size_min: 3
block_size_max: 8

device: cpu
num_workers: 4   # production yaml과 동일
output_dir: outputs/dry_run_shard_oom
checkpoint_every: 1
val_ratio: 0.0
