# Phase 1: Channel-Independent Pre-training — K-MIMIC only with shard backend
# ──────────────────────────────────────────────────────────────
# Server: Biosignal-FM2 — 2xL40S 48GB, 32vCPU, 192GB RAM
# Dataset: K-MIMIC ICU ~3,500 subjects, ~1.94M recordings, 224GB
#          → ~109 shards (1024MB each, shard backend 필수)
# Window: 10분 (600초, 300 patches @patch_size=200)
#
# 핵심 차이 (vs phase1_combined.yaml):
#   * data_dir: K-MIMIC only (VitalDB 제외 — 단독 학습)
#   * shard_index_path 추가 — 1.94M recording 은 file backend 비현실적
#   * next_block_size: 4 → 2 (8s → 4s 미래 예측, sweet spot)
#
# Usage (2-GPU DDP):
#   torchrun --nproc_per_node=2 -m train.1_channel_independency \
#       --config configs/phase1_kmimic.yaml
#
# Smoke test:
#   python -m train.1_channel_independency --config configs/phase1_kmimic.yaml --dry-run

# ── 모델 (Base: d=256, L=12, ~10M params) ──
model_config:
  d_model: 256
  num_layers: 12
  patch_size: 200            # 100Hz × 2초 = 200 samples/patch (300 patches/10min)
  stride: null               # non-overlapping (= patch_size)
  num_heads: 8               # head_dim = 256/8 = 32
  num_groups: null           # MHA (= num_heads)
  num_signal_types: 9        # ECG(0)~ICP(7), RESP(8) — 2026-05-01 RESP 추가
  num_spatial_ids: 26        # TOTAL_SPATIAL_IDS — ECG 12-lead + RESP
  use_glu: true
  use_moe: false             # Phase 1 CI에서는 off
  use_rope: true
  use_var_attn_bias: true
  use_spatial_embed: true
  dropout_p: 0.1

  # ── Task heads ──
  next_block_size: 2         # Block Next Prediction K=2 — 미래 4s (2 patch × 2s)
  contrastive_proj_dim: 0    # Contrastive (Phase 2에서 활성)

# ── 데이터 (K-MIMIC ICU 전용) ──
data_dir:
  - /home/coder/workspace/updown/bio_fm/data/train/k-mimic/
signal_types: [0, 1, 2, 3, 4, 5, 6, 7]  # ECG, ABP, PPG, CVP, CO2, AWP, PAP, ICP
max_subjects: null             # 전체 ~3,500 subjects
window_seconds: 600.0          # 10분 윈도우
max_length: 64000              # CI: 10분 윈도우(60000) + patch 정렬 여유
cache_size: 16                 # shard backend면 recording-level cache 작아도 됨
crop_ratio_min: 0.01           # 이론상 6s (실효는 min_patches floor에 의해 10s)
crop_ratio_max: 1.0
min_patches: 5                 # 임상 최소 입력 — 10s floor (patch_size=200 × 5 / 100Hz)

# ── Shard backend (1.94M recording, file backend 비현실적) ──
# ⚠️ shard_cache_size 는 PER WORKER. 총 RAM ≈ workers × cache × shard_size_GB × num_ranks
#   예: 4 workers × 1 cache × 1GB × 2 ranks = 8GB
shard_index_path: /home/coder/workspace/updown/bio_fm/data/k-mimic_wbs/shard_index.json
shard_cache_size: 1            # OOM 회피 (locality sampler 가 sequential read 보장)

# ── 학습 ──
batch_size: 128                # L40S 48GB×2
lr: 8.0e-4
n_epochs: 80
warmup_epochs: 8               # 10% 비율 유지
min_lr_ratio: 0.1              # 최종 LR = 8e-5
mask_ratio: 0.4                # 40% 패치 마스킹
gradient_clip: 1.0
seed: 42
collate_mode: ci
max_batches: 10000             # 1 epoch당 10000 batch

# ── Loss 가중치 (Phase 1: MPM + Next-Pred) ──
alpha: 1.0                     # masked reconstruction
beta: 0.8                      # next-pred
gamma: 0.0                     # cross-modal (Phase 2에서 활성)
delta: 0.0                     # contrastive (Phase 2에서 활성)
lambda_spec: 0.2               # Multi-Resolution STFT Loss
peak_alpha: 1.0                # Peak-Weighted MSE — R-peak 강화
aux_loss_weight: 0.01
contrastive_temperature: 0.07
learnable_temperature: true

# ── Masking (Block MPM) ──
variate_mask_prob: 0.0         # Phase 1은 비활성
block_mask: true               # 연속 블록 단위 마스킹
block_size_min: 3              # 최소 3패치(6초) — 호흡계 1 cycle 보장
block_size_max: 8              # 최대 8패치(16초)

# ── Mixed Precision ──
use_amp: true                  # L40S BF16/FP16 tensor cores

# ── Validation & Early Stopping ──
val_ratio: 0.05                # subject 단위 5% validation
val_max_batches: 500
patience: 15

# ── 시스템 ──
device: auto
num_workers: 4                 # 보수적 (안정 후 8 가능)
output_dir: outputs/phase1_kmimic
checkpoint_every: 5
viz_every: 1
exp_name: kmimic_d256_L12_10min_p200_k2
